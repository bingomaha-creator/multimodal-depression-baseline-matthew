seed: 42

data:
  manifest_path: /home/rui/24zbma/code/multimodal-depression-baseline-matthew/scripts/data/edaic_manifest.csv
  feature_cache_path: data/edaic_segment_features.pt
  id_column: participant_id
  label_column: label
  phq_column: phq_score
  split_column: split
  text_column: transcript_path
  audio_column: audio_path
  transcript_text_column: Text
  transcript_start_column: Start_Time
  transcript_end_column: End_Time
  transcript_confidence_column: Confidence
  sample_rate: 16000
  segment_seconds: 20
  max_segment_audio_seconds: 20
  max_segments: 30
  min_segment_text_chars: 5
  min_confidence: 0.0
  audio_padding_seconds: 0.2
  max_text_length: 512
  num_workers: 0

model:
  text_model_name: /home/rui/24zbma/models/roberta-base
  audio_model_name: /home/rui/24zbma/models/wav2vec
  hidden_dim: 256
  dropout: 0.1
  modality: both

training:
  batch_size: 16
  epochs: 50
  learning_rate: 5.0e-5
  weight_decay: 1.0e-4
  use_class_weights: true
  device: cuda
  output_dir: outputs_edaic_segment_features
  monitor_metric: f1
  max_train_steps:
