seed: 42

data:
  manifest_path: /home/rui/24zbma/data/E_DAIC/output/edaic_manifest.csv
  text_column: transcript_path
  audio_column: audio_path
  id_column: participant_id
  phq_column: phq_score
  split_column: split
  transcript_text_column: Text
  positive_threshold: 10
  sample_rate: 16000
  max_audio_length: 80000
  max_text_length: 512
  num_workers: 0

model:
  text_model_name: /home/rui/24zbma/models/roberta-base
  audio_model_name: /home/rui/24zbma/models/wav2vec
  hidden_dim: 256
  dropout: 0.1
  freeze_backbones: true

training:
  batch_size: 8
  epochs: 20
  learning_rate: 1.0e-5
  weight_decay: 0.0
  use_class_weights: true
  device: cuda
  output_dir: outputs
  monitor_metric: f1
  max_train_steps:
